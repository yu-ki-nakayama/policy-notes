site_name: "中山雄稀 政策メモ・活動ログ"
site_description: "東京大学公共政策大学院の中山雄稀による、社会保障・財政・教育・安全保障などの政策メモ。制度・データ・論点・政策オプションを整理。"
site_url: "https://yu-ki-nakayama.github.io/policy-notes/"

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - toc.follow
    - search.suggest
    - content.code.copy
plugins:
  - search

nav:
  - Home: index.md
  - About: about.md
  - Themes:
      - 一覧: themes/index.md
  - Activity Log:
      - 一覧: activity/index.md
  - Template:
      - 月次テンプレ: template/monthly.md
      - 活動ログテンプレ: template/activity.md
